# ============================================================
# CI/CD Pipeline for FinanceTracker API
# 
# WHAT THIS DOES:
#   1. Triggers on every push to main and on pull requests
#   2. Sets up .NET 10 SDK
#   3. Restores NuGet packages
#   4. Builds the solution
#   5. Runs all unit tests
#
# WHY CI/CD:
#   - Catches broken builds BEFORE they reach production
#   - Runs tests automatically (you can't forget to test)
#   - Every team member gets the same build environment
#   - Foundation for automated deployment later (CD part)
#
# HOW GITHUB ACTIONS WORKS:
#   - A "workflow" is a YAML file in .github/workflows/
#   - It contains "jobs" that run on virtual machines (runners)
#   - Each job has "steps" that execute in sequence
#   - If any step fails, the pipeline fails and you get notified
# ============================================================

name: CI - Build and Test

# TRIGGERS: When should this pipeline run?
on:
  push:
    branches: [ main ]        # Every push to main
  pull_request:
    branches: [ main ]        # Every PR targeting main

# ENVIRONMENT VARIABLES shared across all jobs
env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    # RUNNER: Which virtual machine to use
    # ubuntu-latest is free for public repos and fastest for .NET
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code from the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Step 3: Restore NuGet packages (like npm install for .NET)
      - name: Restore dependencies
        run: dotnet restore

      # Step 4: Build the solution
      # --no-restore: Skip restore since we just did it
      # -c Release: Build in Release mode (optimized, no debug symbols)
      - name: Build
        run: dotnet build --no-restore -c Release

      # Step 5: Run unit tests
      # --no-build: Skip build since we just did it
      # --verbosity normal: Show test names in output
      # --logger: Format output for GitHub Actions to parse
      - name: Run tests
        run: dotnet test --no-build -c Release --verbosity normal