# ============================================================
# FINANCETRACKER API DEPLOYMENT
#
# KEY CONCEPTS:
#   - Deployment: manages pod replicas and rolling updates
#   - Pod: the smallest unit in K8s (runs your container)
#   - Service: exposes pods to the network
#   - NodePort: makes the service accessible from localhost
#
# SCALING: Change replicas from 2 to 10 and K8s handles the rest.
# SELF-HEALING: If a pod crashes, K8s restarts it automatically.
# ROLLING UPDATES: Deploy new versions with zero downtime.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: financetracker-api
  namespace: financetracker
spec:
  replicas: 2    # Run 2 copies for high availability
  selector:
    matchLabels:
      app: financetracker-api
  template:
    metadata:
      labels:
        app: financetracker-api
    spec:
      containers:
        - name: api
          image: financetracker-api:local
          imagePullPolicy: Never    # Use local Docker image
          ports:
            - containerPort: 8080
          env:
            - name: ConnectionStrings__DefaultConnection
              value: "Server=sqlserver;Database=FinanceTrackerDb;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=true"
            - name: Jwt__Key
              value: "YourSuperSecretKeyThatIsAtLeast32CharactersLong2026!!"
            - name: Jwt__Issuer
              value: "FinanceTracker.API"
            - name: Jwt__Audience
              value: "FinanceTracker.Client"
            - name: Jwt__ExpirationInMinutes
              value: "60"
            - name: Jwt__RefreshTokenExpirationInDays
              value: "7"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: DatabaseProvider
              value: "SqlServer"
          # Health checks — K8s uses these to monitor your app
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
# NodePort service exposes the API on localhost:30080
apiVersion: v1
kind: Service
metadata:
  name: financetracker-api
  namespace: financetracker
spec:
  selector:
    app: financetracker-api
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080     # Access at http://localhost:30080
  type: NodePort